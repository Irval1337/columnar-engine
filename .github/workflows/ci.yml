name: CI

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  asan:
    name: Tests (ASAN+UBSAN)
    runs-on: ubuntu-24.04

    env:
      FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.fetchcontent/asan
      CCACHE_DIR: ${{ github.workspace }}/.ccache/asan

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake clang ccache

      - name: Cache FetchContent (asan)
        uses: actions/cache@v4
        with:
          path: .fetchcontent/asan
          key: fetchcontent-${{ runner.os }}-asan-${{ hashFiles('cmake/deps.cmake', 'CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-${{ runner.os }}-asan-

      - name: Cache ccache (asan)
        uses: actions/cache@v4
        with:
          path: .ccache/asan
          key: ccache-${{ runner.os }}-asan-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-asan-

      - name: Configure (Debug, ASAN+UBSAN)
        run: |
          cmake -S . -B build-asan -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DFETCHCONTENT_BASE_DIR="${FETCHCONTENT_BASE_DIR}" \
            -DCOLUMNAR_BUILD_TESTS=ON \
            -DCMAKE_C_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer" \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer"

      - name: Build
        run: cmake --build build-asan

      - name: Run tests
        run: ctest --test-dir build-asan --output-on-failure

  tsan:
    name: Tests (TSAN)
    runs-on: ubuntu-24.04

    env:
      FETCHCONTENT_BASE_DIR: ${{ github.workspace }}/.fetchcontent/tsan
      CCACHE_DIR: ${{ github.workspace }}/.ccache/tsan

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build cmake clang ccache

      - name: Cache FetchContent (tsan)
        uses: actions/cache@v4
        with:
          path: .fetchcontent/tsan
          key: fetchcontent-${{ runner.os }}-tsan-${{ hashFiles('cmake/deps.cmake', 'CMakeLists.txt') }}
          restore-keys: |
            fetchcontent-${{ runner.os }}-tsan-

      - name: Cache ccache (tsan)
        uses: actions/cache@v4
        with:
          path: .ccache/tsan
          key: ccache-${{ runner.os }}-tsan-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-tsan-

      - name: Configure (Debug, TSAN)
        run: |
          cmake -S . -B build-tsan -G Ninja \
            -DCMAKE_BUILD_TYPE=Debug \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DFETCHCONTENT_BASE_DIR="${FETCHCONTENT_BASE_DIR}" \
            -DCOLUMNAR_BUILD_TESTS=ON \
            -DCMAKE_C_FLAGS="-fsanitize=thread -fno-omit-frame-pointer" \
            -DCMAKE_CXX_FLAGS="-fsanitize=thread -fno-omit-frame-pointer"

      - name: Build
        run: cmake --build build-tsan

      - name: Run tests
        env:
          TSAN_OPTIONS: "halt_on_error=1"
        run: ctest --test-dir build-tsan --output-on-failure

  advisor-benchmark:
    name: Advisor Docker Benchmark
    runs-on: ubuntu-24.04
    needs: [asan, tsan]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare advisor harness
        shell: bash
        run: |
          set -euo pipefail

          HARNESS="${RUNNER_TEMP}/advisor-harness"
          INPUT_DIR="${GITHUB_WORKSPACE}/.ci-input"
          RESULTS_DIR="${GITHUB_WORKSPACE}/.ci-results"
          BENCH_BRANCH="ci-benchmark-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"

          mkdir -p "${HARNESS}/scripts" "${INPUT_DIR}" "${RESULTS_DIR}"

          curl -fsSL \
            https://raw.githubusercontent.com/gmusya/clmnr-ngn/c7cf6827e0f3edf1f46580e137a2ac94619dda82/script/Dockerfile \
            -o "${HARNESS}/Dockerfile"
          curl -fsSL \
            https://raw.githubusercontent.com/gmusya/clmnr-ngn/7660e9a3b7238e21f38697bfa96dd9da770bd5c6/script/commands.sh \
            -o "${HARNESS}/scripts/commands.sh"
          chmod +x "${HARNESS}/scripts/commands.sh"

          git branch -f "${BENCH_BRANCH}" HEAD

          cat > "${HARNESS}/scripts/env.sh" <<EOF
          export BRANCH="${BENCH_BRANCH}"
          export REPO_URL="file:///source"
          export INPUT_CSV="/input/hits.csv"
          export COLUMNAR="/results/hits.bruh"
          export RESULTS="/results"
          EOF

          awk -F, '
            BEGIN { ORS = "" }
            {
              if (NR > 1) {
                printf ","
              }
              if ($2 == "string") {
                printf "\"\""
              } else if ($2 == "date") {
                printf "2013-07-15"
              } else if ($2 == "timestamp") {
                printf "\"2013-07-15 10:47:34\""
              } else if ($2 == "char") {
                printf "x"
              } else {
                printf "0"
              }
            }
            END { printf "\n" }
          ' script/hits.schema.csv > "${INPUT_DIR}/hits.csv"

          echo "HARNESS=${HARNESS}" >> "${GITHUB_ENV}"
          echo "INPUT_DIR=${INPUT_DIR}" >> "${GITHUB_ENV}"
          echo "RESULTS_DIR=${RESULTS_DIR}" >> "${GITHUB_ENV}"

      - name: Build advisor image
        shell: bash
        run: docker build -t columnar-advisor-benchmark -f "${HARNESS}/Dockerfile" "${HARNESS}"

      - name: Run advisor benchmark
        shell: bash
        run: |
          docker run --rm \
            --entrypoint bash \
            --workdir /bench \
            --env GIT_CONFIG_COUNT=1 \
            --env GIT_CONFIG_KEY_0=safe.directory \
            --env GIT_CONFIG_VALUE_0=/source \
            --volume "${GITHUB_WORKSPACE}:/source:ro" \
            --volume "${INPUT_DIR}:/input:ro" \
            --volume "${RESULTS_DIR}:/results" \
            columnar-advisor-benchmark \
            /bench/commands.sh

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: advisor-benchmark-results
          path: .ci-results
